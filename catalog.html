<!DOCTYPE html> <html lang="en"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEAT CATALOG | Sound Shop</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CQ81083J1M"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CQ81083J1M');
    </script>
    <script type="text/javascript" src="https://jstest.authorize.net/v1/Accept.js" charset="utf-8"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700;900&display=swap');
        :root { --teal: #00ffcc; --dark: #020202; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { background: var(--dark); color: #ffffff; font-family: 'Inter', sans-serif; line-height: 1.6; overflow-x: hidden; }

        .hero-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: linear-gradient(to bottom, rgba(2,2,2,0.8), rgba(2,2,2,1)), url('https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-position: center; filter: saturate(0.2); }
        
        nav { padding: 30px 50px; background: rgba(0, 0, 0, 0.5); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(30px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .logo { font-weight: 900; letter-spacing: 10px; font-size: 1.4rem; text-transform: uppercase; }
        .logo span { color: var(--teal); }
        .nav-links a { text-decoration: none; color: #fff; font-size: 0.7rem; margin-left: 25px; letter-spacing: 3px; font-weight: 700; opacity: 0.5; transition: 0.4s; }
        .nav-links a:hover { opacity: 1; color: var(--teal); }

        .content-container { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        .experience-header { text-align: center; margin-bottom: 60px; }
        .experience-header h1 { font-size: 4rem; font-weight: 900; letter-spacing: -2px; line-height: 0.9; }
        .experience-header p { color: var(--teal); letter-spacing: 8px; font-size: 0.8rem; text-transform: uppercase; margin-top: 10px; }

        .track-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 24px; backdrop-filter: blur(20px); margin-bottom: 30px; border-left: 4px solid var(--teal); }
        .track-card h2 { font-style: italic; color: var(--teal); margin-bottom: 10px; }
        audio { width: 100%; filter: invert(100%) hue-rotate(180deg) brightness(1.5); margin: 15px 0; }
        .buy-btn { background: linear-gradient(90deg, #00ffcc, #00c6ff); color: #000; border: none; padding: 15px; width: 100%; border-radius: 50px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.9rem; transition: 0.3s; }

        #paymentModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:2000; justify-content:center; align-items:center; }
        .modal-content { background:#111; border:2px solid var(--teal); padding:35px; border-radius:28px; width:90%; max-width:400px; }
        input { width:100%; padding:15px; margin:10px 0; border-radius:12px; border:1px solid #333; background:#1a1a1a; color:#fff; font-size: 16px; box-sizing: border-box; }

        footer { text-align: center; padding: 80px 20px; color: #444; font-size: 0.6rem; letter-spacing: 5px; font-weight: 900; }
    </style>
</head>
<body>

<div class="hero-bg"></div>

<nav>
    <div class="logo">SOUND<span>SHOP</span></div>
    <div class="nav-links">
        <a href="index.html">HOME</a>
        <a href="catalog.html">BEATS</a>
        <a href="shop.html">GEAR</a>
    </div>
</nav>

<div class="content-container">
    <div class="experience-header">
        <p>PREMIUM INSTRUMENTALS</p>
        <h1>BEAT <br> CATALOG.</h1>
    </div>

    <div id="product-container"></div>
</div>

<div id="paymentModal">
    <div class="modal-content">
        <h3 id="modalTrackName" style="color:var(--teal); margin-top:0; font-style: italic;">Item Name</h3>
        <p id="modalPrice" style="font-weight: 900; font-size: 1.4rem;">$0.00</p>
        <input type="email" id="customerEmail" placeholder="Email for Delivery">
        <input type="tel" id="cardNumber" placeholder="Card Number">
        <div style="display:flex; gap:10px;">
            <input type="tel" id="expMonth" placeholder="MM" maxlength="2">
            <input type="tel" id="expYear" placeholder="YY" maxlength="2">
            <input type="tel" id="cardCode" placeholder="CVV" maxlength="4">
        </div>
        <button class="buy-btn" id="payBtn" onclick="sendPayment()">Complete Secure Purchase</button>
        <button onclick="closeModal()" style="background:none; border:none; color:#666; width:100%; margin-top:20px; cursor:pointer;">Cancel</button>
    </div>
</div>

<footer>SOUND SHOP // FAYETTEVILLE NC // MMXXVI</footer>

<script>
    // --- UPDATED TRACK CATALOG ---
    const defaultTracks = [
        // Original Tracks
        { title: 'Holding Heavy Weight', price: 29.99, file: 'holdenhw.m4a', sku: 'SKU-HHW' },
        { title: 'Grudge Gobbler', price: 19.99, file: 'tgg.m4a', sku: 'SKU-TGG' },
        { title: 'The Rumbler', price: 24.99, file: 'rumbler.m4a', sku: 'SKU-RUM' },
        // New Tracks
        { title: 'Electrovice', price: 29.99, file: 'electro.mp4', sku: 'SKU-EVC' },
        { title: 'The Botrix', price: 29.99, file: 'botrix.mp4', sku: 'SKU-BTX' },
        { title: 'Smoked', price: 24.99, file: 'gsmoke.mp4', sku: 'SKU-SMK' }
    ];

    let currentOrder = {};

    async function loadCatalog() {
        const container = document.getElementById('product-container');
        let products = defaultTracks; 

        try {
            const response = await fetch('/api/catalog');
            if (response.ok) {
                const dbProducts = await response.json();
                if (dbProducts && dbProducts.length > 0) products = dbProducts;
            }
        } catch (err) { console.log("Static Mode Active"); }

        // Note: Using audio/mp4 for all files as they are mostly .mp4/m4a formats
        container.innerHTML = products.map(track => `
            <div class="track-card">
                <h2>${track.title || track.name}</h2>
                <audio controls><source src="${track.file}" type="audio/mp4"></audio>
                <button class="buy-btn" onclick="openModal('${track.title}', '${track.price}', '${track.sku}')">
                    LICENSE BEAT - $${track.price}
                </button>
            </div>`).join('');
    }

    function openModal(name, price, sku) {
        currentOrder = { name, price, sku };
        document.getElementById('modalTrackName').innerText = name;
        document.getElementById('modalPrice').innerText = '$' + price;
        document.getElementById('paymentModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('paymentModal').style.display = 'none'; }

    function sendPayment() {
        const btn = document.getElementById('payBtn');
        btn.innerText = "ENCRYPTING..."; btn.disabled = true;

        const authData = { clientKey: "8C3a2e9HvtZF5v9zn7H6gtr93Z4rxEaRJjQsdZy54j795DjN77Dt5JzrLnjX4Wd2", apiLoginID: "43cLv2Jb" };
        const cardData = {
            cardNumber: document.getElementById("cardNumber").value.replace(/\s+/g, ''),
            month: document.getElementById("expMonth").value,
            year: document.getElementById("expYear").value,
            cardCode: document.getElementById("cardCode").value
        };

        if (typeof Accept === "undefined") {
            alert("Payment Gateway Offline."); btn.disabled = false; btn.innerText = "Complete Secure Purchase"; return;
        }

        Accept.dispatchData({ authData, cardData }, (response) => {
            if (response.messages.resultCode === "Error") {
                alert(response.messages.message[0].text); btn.innerText = "Complete Secure Purchase"; btn.disabled = false;
            } else {
                processCheckout(response.opaqueData);
            }
        });
    }

    async function processCheckout(opaqueData) {
        try {
            const res = await fetch('/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    opaqueData: { dataDescriptor: opaqueData.dataDescriptor, dataValue: opaqueData.dataValue },
                    trackName: currentOrder.name,
                    amount: currentOrder.price,
                    customerEmail: document.getElementById("customerEmail").value
                })
            });
            const result = await res.json();
            if (result.success) window.location.href = "success.html";
            else alert("Error: " + result.error);
        } catch (err) { alert("Checkout engine error."); }
        document.getElementById('payBtn').disabled = false;
    }

    window.onload = loadCatalog;
</script>

</body>
</html>
