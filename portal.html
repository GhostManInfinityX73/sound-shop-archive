<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sound Shop | Entertainment Portal</title>
    <style>
        :root { 
            --teal: #00ffcc; 
            --dark: #0a0a0a; 
            --bolt-white: #ffffff; 
            --sky-blue: #00d2ff; 
        }
        
        body { 
            background-color: var(--dark); color: #fff; 
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; text-align: center; 
            background-image: linear-gradient(rgba(0,0,0,0.95), rgba(0,0,0,0.95)), url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2000');
            background-size: cover; background-attachment: fixed;
        }

        nav { width: 100%; display: flex; justify-content: space-around; padding: 20px 0; background: rgba(0,0,0,0.95); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0, 255, 204, 0.2); backdrop-filter: blur(10px); }
        .nav-links a { color: #fff; text-decoration: none; font-weight: bold; font-size: 0.75rem; margin: 0 10px; text-transform: uppercase; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; padding: 20px; max-width: 1300px; margin: 0 auto; }
        
        .portal-card { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); 
            padding: 20px; border-radius: 20px; backdrop-filter: blur(15px);
            display: flex; flex-direction: column;
        }

        /* --- ARCADE TERMINAL --- */
        .emulator-container { 
            width: 100%; height: 350px; background-color: #000;
            border-radius: 12px; overflow: hidden; position: relative; border: 2px solid #333; 
        }

        /* --- WHITE ELECTRICAL STATIC (3x THICKER) --- */
        .lightning-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 500;
            background: repeating-linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
        }

        .bolt {
            position: absolute; left: -10%; width: 120%; 
            background: #ffffff; /* PURE WHITE */
            box-shadow: 0 0 20px #fff, 0 0 40px #fff, 0 0 60px rgba(255,255,255,0.5);
            opacity: 0;
            clip-path: polygon(0% 50%, 5% 0%, 15% 100%, 25% 10%, 35% 90%, 45% 0%, 55% 100%, 65% 20%, 75% 85%, 85% 5%, 95% 100%, 100% 50%);
            animation: flow-down 3s infinite linear;
        }

        /* Thicker Heights */
        .bolt-1 { height: 12px; animation-delay: 0s; }
        .bolt-2 { height: 18px; animation-delay: 1s; animation-duration: 2s; }
        .bolt-3 { height: 10px; animation-delay: 2s; animation-duration: 4s; }

        @keyframes flow-down {
            0% { transform: translateY(-50px); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(400px); opacity: 0; }
        }

        #game-screen { 
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            display: flex; align-items: center; justify-content: center; z-index: 10;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1511882150382-421056c89033?q=80&w=1000');
            background-size: cover;
        }

        .terminal-text {
            color: var(--teal); font-size: 0.85rem; font-weight: bold; font-family: 'Courier New', monospace;
            z-index: 600; padding: 12px; background: rgba(0,0,0,0.9);
            border: 1px solid var(--teal); text-transform: uppercase;
            box-shadow: 0 0 15px var(--teal);
        }

        /* --- RESTORED SCROLLING MENU --- */
        .game-menu { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; 
            margin-top: 15px; height: 180px; overflow-y: scroll; padding: 5px;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
        }
        
        .game-menu::-webkit-scrollbar { width: 8px; }
        .game-menu::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .game-menu::-webkit-scrollbar-thumb { background: var(--teal); border-radius: 10px; }

        .game-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 255, 204, 0.3); color: #fff; padding: 10px; border-radius: 4px; font-size: 0.65rem; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .game-btn:hover { background: var(--teal); color: #000; box-shadow: 0 0 10px var(--teal); }

        /* --- VIDEO / CONTENT BOXES --- */
        .content-box {
            width: 100%; aspect-ratio: 16/9; background: #111; border-radius: 10px;
            border: 1px solid #333; overflow: hidden;
        }
    </style>
</head>
<body>

    <nav>
        <div style="color: var(--teal); font-weight: 900; font-style: italic;">SOUND SHOP.</div>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="portal.html" style="color: var(--teal);">LOUNGE</a>
        </div>
    </nav>

    <h1 style="font-size: 2rem; margin: 30px 0; letter-spacing: 3px;">ENTERTAINMENT PORTAL</h1>

    <div class="grid-container">
        
        <div class="portal-card">
            <h3 style="color: var(--teal); margin-top: 0;">ARCADE TERMINAL</h3>
            <div class="emulator-container">
                <div class="lightning-container">
                    <div class="bolt bolt-1"></div>
                    <div class="bolt bolt-2"></div>
                    <div class="bolt bolt-3"></div>
                </div>
                <div id="game-screen">
                    <div class="terminal-text">[ SYSTEM INITIALIZED ]</div>
                </div>
            </div>
            
            <div class="game-menu">
                <button class="game-btn">Pac-Man</button>
                <button class="game-btn">Galaga</button>
                <button class="game-btn">Donkey Kong</button>
                <button class="game-btn">Street Fighter II</button>
                <button class="game-btn">Dig Dug</button>
                <button class="game-btn">Popeye</button>
                <button class="game-btn">Centipede</button>
                <button class="game-btn">Q*Bert</button>
                <button class="game-btn">Frogger</button>
                <button class="game-btn">Ms. Pac-Man</button>
            </div>
        </div>

        <div class="portal-card">
            <h3 style="color: var(--teal); margin-top: 0;">CINEMA LOUNGE</h3>
            <div class="content-box">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
            </div>
            <p style="font-size: 0.8rem; color: #aaa; margin-top: 15px;">Experience the latest cinematic instrumental showcases and studio sessions.</p>
            <button class="game-btn" style="margin-top: auto;">VIEW FULL PLAYLIST</button>
        </div>

        <div class="portal-card">
            <h3 style="color: var(--teal); margin-top: 0;">SPOTLIGHT</h3>
            <div class="content-box" style="background: url('https://images.unsplash.com/photo-1470225620780-dba8ba36b745?q=80&w=1000') center/cover;">
                </div>
            <p style="font-size: 0.8rem; color: #aaa; margin-top: 15px;">Monthly feature highlighting independent producers and Sound Shop gear users.</p>
            <button class="game-btn" style="margin-top: auto;">SUBMIT YOUR TRACK</button>
        </div>

    </div>

</body>
</html>
