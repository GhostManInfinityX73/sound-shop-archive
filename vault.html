<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault | Sound Shop Access</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;400;700&display=swap');
        body { margin:0; background:#020202; color:#fff; font-family:'Inter', sans-serif; overflow-x:hidden; }
        .grid-bg { position:fixed; top:0; left:0; width:100%; height:100%; background-image:linear-gradient(rgba(0, 255, 204, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 204, 0.03) 1px, transparent 1px); background-size: 50px 50px; transform: perspective(500px) rotateX(60deg); z-index:-1; }
        
        .vault-header { padding: 80px 20px; text-align:center; }
        h1 { font-weight:100; letter-spacing:15px; font-size:3rem; margin:0; }
        .user-id { color:#00ffcc; font-size:0.7rem; letter-spacing:3px; margin-top:10px; opacity:0.6; }

        .file-grid { max-width:1200px; margin:0 auto; padding:40px; display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 13fr)); gap:20px; }
        .file-card { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); padding:30px; border-radius:24px; transition:0.3s; }
        .file-card:hover { border-color:#00ffcc; background:rgba(0,255,204,0.02); transform:scale(1.02); }
        
        .file-name { font-weight:700; font-size:1.2rem; margin-bottom:5px; display:block; }
        .file-type { color:#555; font-size:0.7rem; text-transform:uppercase; letter-spacing:2px; }
        
        .dl-btn { display:inline-block; margin-top:20px; padding:12px 25px; background:#00ffcc; color:#000; text-decoration:none; border-radius:50px; font-weight:700; font-size:0.8rem; transition:0.3s; }
        .dl-btn:hover { box-shadow:0 0 20px rgba(0,255,204,0.4); }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="vault-header">
        <h1>THE VAULT</h1>
        <div class="user-id" id="display-email">AUTHENTICATING...</div>
    </div>

    <div class="file-grid" id="file-container">
        </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userEmail = urlParams.get('email') || "Anonymous";
        document.getElementById('display-email').innerText = `SESSION: ${userEmail.toUpperCase()}`;

        // Example Library - You can move this to a JSON file later
        const library = [
            { name: "Cinematic Atmosphere Pack Vol 1", type: "WAV / 24-bit", file: "atmos_v1.zip" },
            { name: "808 Street Kit (Legacy Edition)", type: "Drum Kit / MIDI", file: "808_street.zip" },
            { name: "Orchestral Strings - Staccato", type: "Instrument Pack", file: "strings_stac.zip" }
        ];

        const container = document.getElementById('file-container');
        library.forEach(item => {
            container.innerHTML += `
                <div class="file-card">
                    <span class="file-type">${item.type}</span>
                    <span class="file-name">${item.name}</span>
                    <a href="/downloads/${item.file}" class="dl-btn" onclick="logActivity('${item.name}')">DOWNLOAD FILE</a>
                </div>
            `;
        });

        function logActivity(fileName) {
            fetch('/api/log-activity', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: userEmail,
                    action: 'DOWNLOAD',
                    item: fileName,
                    timestamp: new Date()
                })
            });
        }
    </script>
</body>
</html>
