<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Sound Shop | Membership</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #020202; color: #fff; overflow-x: hidden; }

        /* Reuse your animated grid background */
        .grid-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 255, 204, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 204, 0.03) 1px, transparent 1px); background-size: 50px 50px; transform: perspective(500px) rotateX(60deg) translateY(-100px); transform-origin: top; animation: gridMove 20s linear infinite; z-index: -2; }
        @keyframes gridMove { from { background-position: 0 0; } to { background-position: 0 100%; } }

        .container { max-width: 1000px; margin: 100px auto; padding: 0 20px; text-align: center; }
        h1 { font-weight: 100; font-size: 3.5rem; letter-spacing: 15px; margin-bottom: 50px; }

        .tier-grid { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; }
        
        .tier-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px; padding: 60px 40px; width: 400px;
            backdrop-filter: blur(20px); transition: 0.4s;
        }

        .tier-card:hover { border-color: #00ffcc; transform: translateY(-10px); box-shadow: 0 20px 50px rgba(0, 255, 204, 0.1); }

        .tier-card.pro { border-color: rgba(0, 255, 204, 0.4); background: rgba(0, 255, 204, 0.02); }

        .price { font-size: 3rem; font-weight: 700; margin: 20px 0; color: #00ffcc; }
        .price span { font-size: 1rem; font-weight: 100; color: #888; }

        ul { list-style: none; margin: 30px 0; padding: 0; text-align: left; }
        li { margin-bottom: 15px; color: #aaa; font-weight: 300; }
        li::before { content: "✓"; color: #00ffcc; margin-right: 10px; }

        .join-btn {
            display: block; width: 100%; padding: 20px; border-radius: 50px;
            text-decoration: none; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-free { background: transparent; color: #fff; border: 1px solid #333; }
        .btn-pro { background: #00ffcc; color: #000; }
        .btn-pro:hover { box-shadow: 0 0 30px rgba(0, 255, 204, 0.5); }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <div class="container">
        <h1>ACCESS TIERS</h1>
        
        <div class="tier-grid">
            <div class="tier-card">
                <h2 style="font-weight: 100; letter-spacing: 5px;">FREE PASS</h2>
                <div class="price">$0<span>/forever</span></div>
                <ul>
                    <li>Weekly Sound Samples</li>
                    <li>Newsletter Updates</li>
                    <li>Basic Gear Access</li>
                </ul>
                <a href="signup-free.html" class="btn-free join-btn">SIGN UP</a>
            </div>

            <div class="tier-card pro">
                <h2 style="font-weight: 100; letter-spacing: 5px; color: #00ffcc;">PRO MEMBER</h2>
                <div class="price">$19.99<span>/month</span></div>
                <ul>
                    <li>Full Cinematic Catalog</li>
                    <li>Exclusive Drum Kits</li>
                    <li>20% Off All Merch</li>
                    <li>Priority Support</li>
                </ul>
                <a href="checkout.html?plan=pro" class="btn-pro join-btn">GO PRO</a>
            </div>
        </div>
    </div>
</body>
</html>
