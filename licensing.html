<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Licensing & Contracts | Sound Shop</title>
    
    <script type="text/javascript" src="https://jstest.authorize.net/v1/Accept.js" charset="utf-8"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #020202; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
        }

        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)),
                        url('https://images.unsplash.com/photo-1598653222000-6b7b7a552625?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            animation: subtleZoom 30s infinite alternate ease-in-out;
        }

        @keyframes subtleZoom { from { transform: scale(1); } to { transform: scale(1.1); } }

        .glow-orb {
            position: fixed; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0, 255, 204, 0.08) 0%, transparent 70%);
            top: 20%; left: -10%; z-index: -1; pointer-events: none;
        }

        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 25px 50px; background: rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-weight: 900; letter-spacing: 8px; color: #fff; text-transform: uppercase; }
        .logo span { color: #00ffcc; }
        nav a { font-size: 0.7rem; color: #666; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; margin-left: 20px; transition: 0.3s; }
        nav a:hover { color: #00ffcc; }

        .container { max-width: 1100px; margin: 60px auto; padding: 0 20px; }
        
        .header-title { text-align: center; margin-bottom: 60px; }
        .header-title h1 { font-size: 4rem; font-weight: 900; letter-spacing: -2px; line-height: 1; }
        .header-title p { color: #00ffcc; letter-spacing: 6px; font-size: 0.7rem; text-transform: uppercase; margin-top: 10px; }

        .pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-bottom: 80px; }

        .pricing-card {
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px; border-radius: 30px; text-align: center;
            backdrop-filter: blur(15px); transition: 0.4s;
            cursor: pointer;
        }
        .pricing-card:hover, .pricing-card.selected { transform: translateY(-10px); border-color: #00ffcc; background: rgba(0, 255, 204, 0.05); }
        .pricing-card.selected { border-width: 2px; }
        
        .pricing-card h3 { font-size: 0.8rem; letter-spacing: 4px; color: #00ffcc; margin-bottom: 20px; }
        .price { font-size: 3.5rem; font-weight: 100; margin-bottom: 10px; }

        .contract-section { 
            background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px; padding: 50px; backdrop-filter: blur(20px);
        }

        .contract-box {
            background: #000; border: 1px solid #222; 
            padding: 40px; height: 300px; overflow-y: auto; 
            border-radius: 20px; font-family: 'Courier New', monospace;
            font-size: 0.9rem; color: #888; margin-bottom: 30px; line-height: 1.6;
        }

        input { 
            width: 100%; padding: 20px; background: rgba(255,255,255,0.03); 
            border: 1px solid #333; color: #fff; border-radius: 15px; 
            font-size: 1rem; margin-bottom: 20px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #00ffcc; }

        .sig-pad { background: #fff; border-radius: 15px; cursor: crosshair; }

        .buy-btn { 
            background: #fff; color: #000; padding: 20px; border: none; 
            border-radius: 50px; font-weight: 900; width: 100%; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            transition: 0.4s; margin-top: 20px;
        }
        .buy-btn:hover { background: #00ffcc; transform: scale(1.02); }

        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 2000; 
            align-items: center; justify-content: center;
        }
        .modal-content { 
            background: #0a0a0a; padding: 50px; border-radius: 40px; 
            border: 1px solid #00ffcc; width: 90%; max-width: 500px; 
            text-align: center; animation: popUp 0.4s ease;
        }
        @keyframes popUp { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        footer { text-align: center; padding: 80px; color: #222; font-size: 0.6rem; letter-spacing: 5px; }
    </style>
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CQ81083J1M">
</script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-CQ81083J1M');
</script>
</head>
<body>

<div class="bg-overlay"></div>
<div class="glow-orb"></div>

<nav>
    <div class="logo">SOUND<span>SHOP</span></div>
    <div class="nav-links">
        <a href="catalog.html">Catalog</a>
        <a href="shop.html">Shop</a>
        <a href="index.html">Exit</a>
    </div>
</nav>

<div class="container">
    <div class="header-title">
        <p>Official Licensing</p>
        <h1>SECURE THE RIGHTS.</h1>
    </div>

    <div class="pricing-grid">
        <div class="pricing-card" onclick="selectTier('Standard', '49.00', this)">
            <h3>STANDARD</h3>
            <div class="price">$49</div>
            <p style="color: #555; font-size: 0.8rem;">Non-Monetized Content</p>
        </div>
        <div class="pricing-card selected" onclick="selectTier('Commercial', '149.00', this)">
            <h3>COMMERCIAL</h3>
            <div class="price">$149</div>
            <p style="color: #00ffcc; font-size: 0.8rem;">Full Monetization Rights</p>
        </div>
        <div class="pricing-card" onclick="selectTier('Exclusive', '499.00', this)">
            <h3>EXCLUSIVE</h3>
            <div class="price">$499</div>
            <p style="color: #555; font-size: 0.8rem;">Ownership Transfer</p>
        </div>
    </div>

    <div class="contract-section">
        <h2 style="font-weight: 100; letter-spacing: 5px; margin-bottom: 30px;">MASTER LICENSE AGREEMENT</h2>
        <div class="contract-box" id="main-contract-box"></div>

        <form onsubmit="handleFinalSubmit(event)">
            <input type="text" class="nameInput" id="licenseeName" placeholder="LEGAL FULL NAME" required onkeyup="syncSignatures(this.value)">
            <p style="font-size: 0.7rem; color: #444; margin-bottom: 10px; letter-spacing: 2px;">DRAW SIGNATURE BELOW</p>
            <canvas class="sig-pad" id="signature-canvas" width="800" height="150" style="width: 100%; height: 120px;"></canvas>
            <button type="submit" class="buy-btn">Authorize & Proceed to Payment</button>
        </form>
    </div>
</div>

<div id="payment-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="font-weight: 100; color: #00ffcc; margin-bottom: 10px;">SECURE CHECKOUT</h2>
        <p id="displayCharge" style="font-size: 0.8rem; color: #666; margin-bottom: 25px;"></p>
        <form id="paymentForm">
            <input type="text" id="cardNumber" placeholder="CARD NUMBER" required>
            <div style="display:flex; gap:10px;">
                <input type="text" id="expMonth" placeholder="MM" style="flex:1;">
                <input type="text" id="expYear" placeholder="YYYY" style="flex:1;">
                <input type="text" id="cardCode" placeholder="CVV" style="flex:1;">
            </div>
            <button type="button" class="buy-btn" style="background: #00ffcc;" onclick="sendPaymentToAuthorize()">PAY NOW</button>
            <button type="button" onclick="toggleModal('payment-modal', false)" style="background:none; border:none; color:#444; margin-top:20px; cursor:pointer; font-size: 0.7rem;">CANCEL TRANSACTION</button>
        </form>
    </div>
</div>

<footer>&copy; 2026 SOUND SHOP // FAYETTEVILLE NC</footer>

<script>
    let currentTier = "Commercial";
    let currentPrice = "149.00";

    function selectTier(tier, price, element) {
        currentTier = tier;
        currentPrice = price;
        document.querySelectorAll('.pricing-card').forEach(card => card.classList.remove('selected'));
        element.classList.add('selected');
        updateContract();
    }

    function updateContract() {
        const name = document.getElementById('licenseeName').value || "________________";
        const contractHTML = `
            <h3 style="color:#00ffcc">1. THE AGREEMENT</h3>
            <p>This <strong>${currentTier}</strong> Recording License is entered into on March 13, 2026, between <strong>Sound Shop</strong> and <span class="sig-display" style="color:#fff; font-weight:bold;">${name}</span>.</p>
            <br>
            <h3 style="color:#00ffcc">2. GRANT OF RIGHTS</h3>
            <p>Producer grants Licensee a worldwide right to use audio assets for ${currentTier === 'Standard' ? 'Personal' : 'Professional'} media production.</p>
            <br>
            <h3 style="color:#00ffcc">3. FEES</h3>
            <p>Licensee agrees to a one-time non-refundable fee of <strong>$${currentPrice}</strong>.</p>
            <br>
            <p><strong>SIGNED:</strong> <span class="sig-display" style="font-style: italic; color:#00ffcc;">${name}</span></p>
        `;
        document.getElementById('main-contract-box').innerHTML = contractHTML;
        document.getElementById('displayCharge').innerText = `Charging $${currentPrice} for ${currentTier} License`;
    }

    function syncSignatures(val) {
        const displays = document.querySelectorAll('.sig-display');
        displays.forEach(d => d.innerText = val || "________________");
    }

    function toggleModal(id, show) {
        document.getElementById(id).style.display = show ? 'flex' : 'none';
    }

    function handleFinalSubmit(e) {
        e.preventDefault();
        toggleModal('payment-modal', true);
    }

    // AUTHORIZE.NET LOGIC
    function sendPaymentToAuthorize() {
        const authData = {
            clientKey: "YOUR_PUBLIC_CLIENT_KEY", // Get from Authorize.net
            apiLoginID: "YOUR_API_LOGIN_ID"     // Get from Authorize.net
        };

        const cardData = {
            cardNumber: document.getElementById("cardNumber").value,
            month: document.getElementById("expMonth").value,
            year: document.getElementById("expYear").value,
            cardCode: document.getElementById("cardCode").value
        };

        const secureData = { authData, cardData };

        // This triggers the Accept.js library to encrypt the card data
        Accept.dispatchData(secureData, responseHandler);
    }

    function responseHandler(response) {
        if (response.messages.resultCode === "Error") {
            alert("Payment Data Error: " + response.messages.message[0].text);
        } else {
            // Success: send the Opaque Data to our server.js
            processTransaction(response.opaqueData);
        }
    }

    function processTransaction(opaqueData) {
        fetch('http://localhost:3000/charge', { 
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                dataDescriptor: opaqueData.dataDescriptor,
                dataValue: opaqueData.dataValue,
                amount: currentPrice
            })
        })
        .then(res => res.json())
        .then(result => {
            if(result.success) {
                window.location.href = "success.html";
            } else {
                alert("Payment Failed: " + result.message);
            }
        })
        .catch(err => {
            console.error("Connection Error:", err);
            alert("Could not connect to the Sound Shop Server. Is server.js running?");
        });
    }

    // SIGNATURE CANVAS
    const canvas = document.getElementById('signature-canvas');
    const ctx = canvas.getContext('2d');
    let writing = false;
    canvas.addEventListener('mousedown', () => { writing = true; ctx.beginPath(); });
    window.addEventListener('mouseup', () => writing = false);
    canvas.addEventListener('mousemove', (e) => {
        if(!writing) return;
        const rect = canvas.getBoundingClientRect();
        ctx.lineWidth = 2;
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke();
    });

    // Initialize
    updateContract();
</script>

</body>
</html>
