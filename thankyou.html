<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | Sound Shop</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
            background: #020202; color: #ffffff; 
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }

        /* Animated Glow Background */
        .bg-glow {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0, 255, 204, 0.1) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0.8; }
        }

        .success-card {
            text-align: center;
            padding: 60px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 40px;
            backdrop-filter: blur(20px);
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .icon-circle {
            width: 80px; height: 80px;
            border: 2px solid #00ffcc;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 30px;
            color: #00ffcc;
            font-size: 2rem;
            text-shadow: 0 0 15px #00ffcc;
        }

        h1 { font-weight: 100; letter-spacing: 10px; margin-bottom: 20px; text-transform: uppercase; }
        p { color: #888; font-weight: 300; margin-bottom: 20px; line-height: 1.6; }
        
        /* Transaction ID Styling */
        #order-meta {
            margin-bottom: 40px;
            font-size: 0.85rem;
            color: #00ffcc;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn-group { display: flex; flex-direction: column; gap: 15px; }

        .btn {
            padding: 18px; border-radius: 50px; border: none;
            font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; transition: 0.3s; text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary { background: #00ffcc; color: #000; }
        .btn-primary:hover { box-shadow: 0 0 25px rgba(0, 255, 204, 0.5); transform: translateY(-3px); }

        .btn-outline { background: transparent; color: #666; border: 1px solid #333; }
        .btn-outline:hover { border-color: #00ffcc; color: #00ffcc; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="success-card">
        <div class="icon-circle">✓</div>
        <h1>SUCCESS</h1>
        <p>Your order has been logged in the vault. A confirmation and download link has been sent to: <br><strong id="display-email" style="color:#fff;"></strong></p>
        
        <div id="order-meta"></div>
        
        <div class="btn-group">
            <a href="index.html" class="btn btn-primary">GO TO DASHBOARD</a>
            <a href="shop.html" class="btn btn-outline">BACK TO SHOP</a>
        </div>
    </div>

    <script>
        // Get data from URL parameters
        const params = new URLSearchParams(window.location.search);
        const email = params.get('email') || 'your inbox';
        const transId = params.get('id');

        // Display the email
        document.getElementById('display-email').textContent = email;

        // Display the Trans ID if it exists
        if (transId) {
            document.getElementById('order-meta').innerHTML = `Vault ID: ${transId}`;
        }
    </script>
</body>
</html>
